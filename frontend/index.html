<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;">
  <title>WKO5 Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <header class="header app-header">
    <div class="logo">
      <svg width="28" height="28" viewBox="0 0 28 28" aria-hidden="true">
        <circle cx="14" cy="14" r="13" fill="none" stroke="currentColor" stroke-width="2"/>
        <path d="M7 18 L10 10 L14 16 L18 8 L21 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>WKO5</span>
    </div>

    <nav class="tab-bar" role="tablist">
      <!-- Populated dynamically by dashboard.js from layout-manager -->
    </nav>
  </header>

  <main class="content">
    <div class="tab-panels">
      <!-- Populated dynamically by dashboard.js from layout-manager -->
    </div>
  </main>

  <footer class="status-bar">
    <div class="connection-status">
      <span class="status-dot" data-status="disconnected"></span>
      <span class="sync-label">Last sync: --</span>
    </div>
    <button class="theme-toggle" data-action="toggle-theme" aria-label="Toggle theme">
      <svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
        <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1ZM8 13V3a5 5 0 0 1 0 10Z" fill="currentColor"/>
      </svg>
    </button>
  </footer>

  <script defer src="lib/d3.min.js"></script>
  <script defer src="js/api.js"></script>
  <script defer src="js/panel-registry.js"></script>
  <script defer src="js/charts/pmc.js"></script>
  <script defer src="js/charts/mmp.js"></script>
  <script defer src="js/charts/ride-timeseries.js"></script>
  <script defer src="js/charts/zones.js"></script>
  <script defer src="js/charts/segment-profile.js"></script>
  <script defer src="js/charts/clinical.js"></script>
  <script defer src="js/charts/health-status.js"></script>
  <script defer src="js/charts/if-floor.js"></script>
  <script defer src="js/charts/panic-training.js"></script>
  <script defer src="js/charts/if-distribution.js"></script>
  <script defer src="js/charts/ftp-growth.js"></script>
  <script defer src="js/charts/rolling-pd.js"></script>
  <script defer src="js/charts/opportunity-cost.js"></script>
  <script defer src="js/charts/glycogen-budget.js"></script>
  <script defer src="js/layout-manager.js"></script>
  <script defer src="lib/Sortable.min.js"></script>
  <script defer src="js/app.js"></script>
  <script defer src="js/dashboard.js"></script>
</body>
</html>
